name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build and push Docker image ─────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tag with both the git SHA (unique, forces re-pull) and latest
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/psych101-ai:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/psych101-ai:latest
          # Use the previous :latest image on Docker Hub as the layer cache.
          # This persists forever (unlike GHA cache which expires after 7 days)
          # so even a cold runner gets a warm cache from the last successful build.
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/psych101-ai:latest
          cache-to: type=inline

      # ── Update Azure Web App to the new SHA-tagged image and restart ─────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update image tag and restart
        run: |
          az webapp config container set \
            --resource-group psych101-ai-rg \
            --name psych101-ai \
            --docker-custom-image-name ${{ secrets.DOCKERHUB_USERNAME }}/psych101-ai:${{ github.sha }}
          az webapp restart --resource-group psych101-ai-rg --name psych101-ai
