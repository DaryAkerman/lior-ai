<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Brain Model</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080818; overflow: hidden; font-family: 'Segoe UI', 'Arial Hebrew', 'David', system-ui, sans-serif; }
    #canvas { display: block; }

    /* ── Loading ─────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #080818;
      z-index: 999;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      transition: opacity 0.7s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }

    /* ── Popup ─────────────────────────────────────── */
    #popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      opacity: 0;
      pointer-events: none;
      background: rgba(8, 12, 28, 0.96);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 18px;
      padding: 28px 28px 22px;
      max-width: 400px;
      width: 90%;
      color: white;
      z-index: 200;
      transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1),
                  opacity 0.25s ease;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.7),
                  0 0 0 1px rgba(255,255,255,0.04),
                  inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #popup.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }
    #popup-bar { width: 48px; height: 4px; border-radius: 2px; margin-bottom: 18px; }
    #popup-category {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; color: rgba(255,255,255,0.35); margin-bottom: 6px;
      text-align: right;
    }
    #popup-title {
      font-size: 22px; font-weight: 700; margin-bottom: 14px;
      color: #fff; line-height: 1.4; text-align: right;
    }
    #popup-desc {
      font-size: 13.5px; line-height: 1.85;
      color: rgba(255,255,255,0.68); margin-bottom: 22px;
      text-align: right;
    }
    .popup-btns { display: flex; gap: 10px; }
    .pbtn {
      padding: 10px 18px; border-radius: 10px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600;
      letter-spacing: 0.3px; transition: all 0.2s;
    }
    #btn-explore { flex: 1; background: linear-gradient(135deg, #3b7cf4, #8b42f5); color: #fff; }
    #btn-explore:hover { opacity: 0.88; transform: translateY(-1px); }
    #btn-close {
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #btn-close:hover { background: rgba(255,255,255,0.13); }

    /* ── Tooltip ─────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(8,12,28,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff; padding: 6px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      pointer-events: none; z-index: 150;
      opacity: 0; transition: opacity 0.15s;
      white-space: nowrap; backdrop-filter: blur(10px);
    }
    #tooltip.show { opacity: 1; }

    /* ── Top UI ─────────────────────────────────────── */
    #hud-title {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 15px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,0.9);
      z-index: 50; text-shadow: 0 0 20px rgba(100,160,255,0.4);
    }
    #hud-sub {
      position: fixed; top: 50px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); z-index: 50; transition: color 0.4s;
    }

    /* ── Back button ─────────────────────────────────── */
    #btn-back {
      position: fixed; top: 22px; left: 22px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); padding: 9px 18px;
      border-radius: 30px; cursor: pointer; font-size: 13px;
      font-weight: 600; z-index: 100;
      opacity: 0; pointer-events: none; transition: all 0.3s;
      backdrop-filter: blur(12px); direction: rtl;
    }
    #btn-back.show { opacity: 1; pointer-events: all; }
    #btn-back:hover { background: rgba(255,255,255,0.13); transform: translateX(2px); }

    /* ── Legend ─────────────────────────────────────── */
    #legend {
      position: fixed; bottom: 28px; left: 28px;
      z-index: 50; display: flex; flex-direction: column;
      gap: 5px; transition: opacity 0.4s;
    }
    #legend.hidden { opacity: 0; pointer-events: none; }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: background 0.15s;
    }
    .legend-item:hover { background: rgba(255,255,255,0.05); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; }

    /* ── Dim overlay ─────────────────────────────────── */
    #dim {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 190; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #dim.show { opacity: 1; pointer-events: all; }

    /* ── Mobile / tablet overrides ───────────────────────── */
    @media (max-width: 768px) {
      #hud-title { font-size: 12px; letter-spacing: 2.5px; top: 16px; }
      #hud-sub   { font-size: 10px; top: 38px; }

      #popup { padding: 22px 18px 18px; border-radius: 14px; }
      #popup-title { font-size: 18px; }
      #popup-desc  { font-size: 13px; margin-bottom: 16px; }
      .pbtn { padding: 11px 14px; font-size: 12px; }

      #btn-back { top: 14px; left: 14px; padding: 10px 16px; font-size: 12px; }

      #legend { bottom: 16px; left: 14px; gap: 3px; }
      .legend-item { padding: 5px 8px; }
      .legend-label { font-size: 10px; }
      .legend-dot   { width: 8px; height: 8px; }

      .ann-label { font-size: 11px; padding: 7px 12px; min-height: 34px;
                   display: flex; align-items: center; }
    }
    @media (max-width: 480px) {
      #legend { display: none; }   /* too cramped on phones — use annotation labels */
    }

    /* ── Annotation labels ───────────────────────────────── */
    #ann-svg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 39;
    }
    .ann-label {
      position: fixed;
      background: rgba(6, 9, 22, 0.82);
      border: 1px solid;
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(255,255,255,0.88);
      cursor: pointer;
      z-index: 40;
      pointer-events: all;
      backdrop-filter: blur(10px);
      white-space: nowrap;
      user-select: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 18px rgba(0,0,0,0.5);
      transition: background 0.18s, transform 0.18s, opacity 0.35s;
      direction: rtl;
    }
    .ann-label:hover {
      background: rgba(22, 34, 72, 0.97);
      transform: translate(-50%, -50%) scale(1.07);
    }
    .ann-label.ann-hidden {
      opacity: 0;
      pointer-events: none;
    }
    /* SVG line + dot fade */
    #ann-svg line, #ann-svg circle {
      transition: opacity 0.4s ease;
    }

    /* ── Brain Mini Chat ─────────────────────────────────── */
    #brain-chat-toggle {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #5b1a7a, #8b42f5);
      border: none; border-radius: 50%;
      color: white; font-size: 22px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 20px rgba(139,66,245,0.55);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #brain-chat-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(139,66,245,0.75);
    }

    #brain-chat-panel {
      position: fixed; bottom: 92px; right: 28px;
      width: 320px; height: 440px;
      background: rgba(8, 12, 28, 0.97);
      border: 1px solid rgba(139,66,245,0.35);
      border-radius: 18px;
      display: flex; flex-direction: column;
      z-index: 300;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7),
                  0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      overflow: hidden;
      transform: scale(0.85) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1),
                  opacity 0.2s ease;
      font-family: 'Segoe UI', 'Arial Hebrew', system-ui, sans-serif;
    }
    #brain-chat-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    #bc-header {
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, rgba(91,26,122,0.9), rgba(139,66,245,0.7));
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #bc-header-title {
      font-size: 14px; font-weight: 700; color: white;
      direction: rtl;
    }
    #bc-header-sub {
      font-size: 11px; color: rgba(255,255,255,0.6);
      direction: rtl; margin-top: 2px;
    }
    #bc-close {
      background: rgba(255,255,255,0.15); border: none;
      color: white; border-radius: 50%; width: 28px; height: 28px;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s;
    }
    #bc-close:hover { background: rgba(255,255,255,0.28); }

    #bc-messages {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #bc-messages::-webkit-scrollbar { width: 4px; }
    #bc-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .bc-msg {
      max-width: 88%;
      font-size: 13px; line-height: 1.6;
      padding: 9px 13px; border-radius: 14px;
      direction: rtl; word-break: break-word;
    }
    .bc-msg.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .bc-msg.user {
      background: linear-gradient(135deg, #5b1a7a, #8b42f5);
      color: white;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .bc-msg.typing {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      align-self: flex-end; font-style: italic; font-size: 12px;
    }

    #bc-input-row {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    #bc-input {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: white;
      padding: 8px 12px; font-size: 13px;
      font-family: inherit; resize: none; outline: none;
      direction: rtl; min-height: 36px; max-height: 90px;
      transition: border-color 0.2s;
    }
    #bc-input::placeholder { color: rgba(255,255,255,0.3); }
    #bc-input:focus { border-color: rgba(139,66,245,0.7); }
    #bc-send {
      width: 36px; height: 36px; flex-shrink: 0;
      background: linear-gradient(135deg, #5b1a7a, #8b42f5);
      border: none; border-radius: 10px; color: white;
      cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    #bc-send:hover { opacity: 0.85; }
    #bc-send:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 480px) {
      #brain-chat-panel { width: calc(100vw - 32px); right: 16px; bottom: 82px; }
      #brain-chat-toggle { bottom: 20px; right: 16px; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<svg id="ann-svg"></svg>

<!-- Brain mini-chat -->
<button id="brain-chat-toggle" title="שאל שאלה על המוח" onclick="toggleBrainChat()">💬</button>
<div id="brain-chat-panel">
  <div id="bc-header">
    <div>
      <div id="bc-header-title">🧠 שאל על המוח</div>
      <div id="bc-header-sub">שאלות על אזורי המוח ותפקודיהם</div>
    </div>
    <button id="bc-close" onclick="toggleBrainChat()">✕</button>
  </div>
  <div id="bc-messages">
    <div class="bc-msg bot">שלום! אני כאן לענות על שאלות לגבי אזורי המוח ותפקודיהם. לחץ על אזור במודל או שאל אותי כל שאלה.</div>
  </div>
  <div id="bc-input-row">
    <textarea id="bc-input" placeholder="שאל שאלה..." rows="1"
      onkeydown="bcHandleKey(event)" oninput="bcResize(this)"></textarea>
    <button id="bc-send" onclick="bcSend()">➤</button>
  </div>
</div>

<div id="loading">טוען מודל מוח…</div>
<div id="hud-title">מודל מוח</div>
<div id="hud-sub">לחץ על אזור לחקירה</div>
<button id="btn-back">→ חזרה למוח המלא</button>
<div id="tooltip"></div>
<div id="legend"></div>

<div id="dim"></div>
<div id="popup" dir="rtl">
  <div id="popup-bar"></div>
  <div id="popup-category"></div>
  <div id="popup-title"></div>
  <div id="popup-desc"></div>
  <div class="popup-btns">
    <button class="pbtn" id="btn-explore">← חקור אזורים</button>
    <button class="pbtn" id="btn-close">סגור</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.155.0",
    "three/addons/": "https://esm.sh/three@0.155.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Brain region data ───────────────────────────────────────────────────────
// positions are in the normalized brain coordinate space
// (brain ~3 units wide, centered at origin, Y+ up, Z+ front)
const BRAIN = {
  'frontal': {
    name: 'אונה המצחית', category: 'קורטקס מוחי', color: 0xf87171, modelFile: 'frontal.glb',
    desc: 'האונה הגדולה ביותר, אחראית על תפקודים ניהוליים — תכנון, קבלת החלטות, שליטה בדחפים, זיכרון עבודה ותנועה רצונית. לתאונות הפוגעות באונות המצח יכולות להיות השפעות הרסניות על פעילות האדם ועל אישיותו.',
    pos: [0, 0.55, 1.35], scl: [1.85, 1.25, 1.3],

        pos:[-0.05, 0.45, 1.2], scl:[1.1, 0.8, 0.75] },
      { id:'mc',    name:'קורטקס מוטורי',            category:'אונה המצחית', color:0xfb923c,
        desc:'הקורטקס המוטורי הראשוני שולט בכל תנועות הגוף הרצוניות. הוא ממפה את הגוף כולו ב"הומונקולוס מוטורי" — ידיים ופנים מיוצגים בשטח גדול במיוחד.',
        pos:[0, 0.9, 0.4], scl:[1.55, 0.45, 0.5] },
      { id:'broca', name:'אזור ברוקה',               category:'אונה המצחית', color:0xfbbf24,

      { id:'ofc',   name:'קורטקס אורביטופרונטלי',    category:'אונה המצחית', color:0xf97316,
        desc:'יושב ממש מעל שקעי העיניים. מפתח לקבלת החלטות רגשיות, עיבוד תגמול ושליטה בדחפים. מקושר רבות למערכת הלימבית.',
        pos:[0, -0.05, 1.55], scl:[0.85, 0.45, 0.5] },
    ]
  },
  'parietal': {
    name: 'אונה הקודקודית', category: 'קורטקס מוחי', color: 0xfb923c, modelFile: 'parietal.glb',
    desc: 'משלבת קלט חושי — מגע, כאב, טמפרטורה, פרופריוצפציה — ומטפלת בהיגיון מרחבי, ניווט ומודעות לגוף. מספקת לנו מידע על מיקום הגוף בחלל.',
    pos: [0, 1.2, -0.15], scl: [1.7, 0.95, 1.05],
    subs: [
      { id:'s1',  name:'קורטקס סומטוסנסורי',         category:'אונה הקודקודית', color:0xfcd34d,

        pos:[0, 0.85, 0.3], scl:[1.45, 0.42, 0.5] },
      { id:'ppc', name:'קורטקס קודקודי אחורי',        category:'אונה הקודקודית', color:0xf59e0b,
        desc:'משלב מידע חזותי ומרחבי לצורך הנחיית תנועות ובניית מפה פנימית של החלל. פגיעה גורמת לתסמונת "הזנחה" — אדישות לצד אחד של המרחב.',
        pos:[0, 1.1, -0.55], scl:[1.35, 0.6, 0.65] },
      { id:'ag',  name:'הגירוס הזוויתי',              category:'אונה הקודקודית', color:0xd97706,
        desc:'אזור מרכזי בצומת האונות הקודקודית, הרקתית והעורפית. מעורב בשפה, עיבוד מספרים, קוגניציה מרחבית ומודעות עצמית.',
        pos:[-0.8, 0.7, -0.4], scl:[0.55, 0.45, 0.5] },
    ]
  },
  'temporal-l': {
    name: 'האונה הרקתית (שמאל)', category: 'קורטקס מוחי', color: 0xfde68a, modelFile: 'temporal_l.glb',
    desc: 'האונה הרקתית השמאלית שולטת בהבנת השפה, זיכרון מילולי וידע סמנטי. אזור ורניקה, האחראי על הבנת הדיבור, ממוקם כאן. כמו כן מעבדת אותות שמיעתיים.',
    pos: [-1.55, -0.05, 0.15], scl: [0.7, 0.95, 1.45],
    subs: [
      { id:'a1-l',     name:'קורטקס שמיעתי',          category:'רקתית שמאל', color:0xfef08a,
        desc:'הקורטקס השמיעתי הראשוני מפענח את גובה הצליל, הקצב ומיקום הצלילים המגיעים משתי האוזניים. הצד השמאלי רגיש יותר לצלילי דיבור.',

// ─── Region centers for hit-point detection ──────────────────────────────────
// Each entry: { id, pos: THREE.Vector3, radius }  (radius ≈ rough lobe size)
const REGION_CENTERS = Object.entries(BRAIN).map(([id, d]) => ({
  id,
  pos: new THREE.Vector3(...d.pos),
  radius: Math.max(...d.scl) * 1.0,
}));

// ─── Helper: hex color string ─────────────────────────────────────────────────
function hex(c) { return '#' + new THREE.Color(c).getHexString(); }

// ─── Helper: make a hover-indicator sphere ────────────────────────────────────
function makeIndicator(pos, scl, color) {
  const g = new THREE.SphereGeometry(1, 32, 20);
  const m = new THREE.Mesh(g, new THREE.MeshPhongMaterial({
    color,
    transparent: true,
    opacity: 0,
    shininess: 40,
    specular: new THREE.Color(0x333333),
  }));
  m.position.set(...pos);
  m.scale.set(...scl);
  return m;
}

// ─── Helper: make a sub-region sphere (for sub-view) ─────────────────────────
function makeSubSphere(pos, scl, color, opacity = 0) {
  const col = new THREE.Color(color);
  const g = new THREE.SphereGeometry(1, 48, 32);
  const m = new THREE.Mesh(g, new THREE.MeshPhongMaterial({
    color,
    transparent: true,
    opacity,
    shininess: 120,
    specular: new THREE.Color(0xffffff).multiplyScalar(0.35),
    emissive: col.clone().multiplyScalar(0.20),
  }));
  m.position.set(...pos);
  m.scale.set(...scl);
  return m;
}

// ─── Helper: outer glow shell around a sub-sphere ────────────────────────────
function makeGlowShell(pos, scl, color, opacity = 0) {
  const col = new THREE.Color(color);
  const g = new THREE.SphereGeometry(1, 32, 20);
  const m = new THREE.Mesh(g, new THREE.MeshPhongMaterial({
    color: col,
    transparent: true,
    opacity,
    shininess: 0,
    emissive: col.clone().multiplyScalar(0.6),
    depthWrite: false,
    side: THREE.BackSide,
  }));
  // Slightly larger than the inner blob
  m.position.set(...pos);
  m.scale.set(scl[0] * 1.22, scl[1] * 1.22, scl[2] * 1.22);
  return m;
}

// ─── State ────────────────────────────────────────────────────────────────────
let view = 'main';
let glbBrain = null;
let glbMeshes = [];             // all Mesh objects inside the loaded GLB
let glbTargetOpacity = 1;       // for smooth fade
let glbOriginalMaterials = [];  // { mesh, mat } — to restore after sub-view
let hoveredRegionId = null;
const indicatorMeshes = {};     // regionId → THREE.Mesh (hover indicator spheres)
const subMeshes = [];           // sphere meshes shown in sub-view
const glowShells = [];          // outer glow meshes paired with sub-spheres

// ─── Touch device detection ───────────────────────────────────────────────────
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ─── Raycaster ───────────────────────────────────────────────────────────────
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ─── Find closest brain region to a world-space point ────────────────────────
function regionAtPoint(worldPt) {
  let best = null, bestDist = Infinity;
  for (const rc of REGION_CENTERS) {
    const d = worldPt.distanceTo(rc.pos);
    if (d < bestDist) { bestDist = d; best = rc.id; }
  }
  return best;
}

// ─── Build hover-indicator spheres ───────────────────────────────────────────
function buildIndicators() {
  Object.entries(BRAIN).forEach(([id, d]) => {
    const mesh = makeIndicator(d.pos, d.scl, d.color);
    mesh.userData = { id, kind: 'indicator', d };
    root.add(mesh);
    indicatorMeshes[id] = mesh;
  });
}

// ─── GLB loading ─────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load('./brain.glb',
  (gltf) => {
    glbBrain = gltf.scene;

    // Auto-scale & center
    const box = new THREE.Box3().setFromObject(glbBrain);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    glbBrain.position.sub(center);
    // Scale so the brain spans ~3.2 units — matching the BRAIN data coordinate space
    const scaleFactor = 3.2 / Math.max(size.x, size.y, size.z);
    glbBrain.scale.setScalar(scaleFactor);
    // Small Y offset so the visual center matches the camera target
    glbBrain.position.y += 0.1;

    // Collect meshes for raycasting; store original materials
    glbBrain.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        glbMeshes.push(child);
        // Ensure material supports emissive for hover glow
        if (child.material) {
          // clone to avoid mutating shared materials
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = 1;
          glbOriginalMaterials.push({ mesh: child, opacity: 1 });
        }
      }
    });

    root.add(glbBrain);

    buildIndicators();
    buildLegend();
    buildAnnotations();

    // Fade out loading screen
    const loadEl = document.getElementById('loading');
    loadEl.classList.add('fade');
    setTimeout(() => loadEl.remove(), 800);
  },
  (progress) => {
    if (progress.total) {
      const pct = Math.round(progress.loaded / progress.total * 100);
      document.getElementById('loading').textContent = `טוען מודל מוח… ${pct}%`;
    }
  },
  (err) => {
    console.error('GLB load error:', err);
    document.getElementById('loading').textContent = 'שגיאה בטעינת brain.glb — יש להריץ דרך שרת מקומי.';
  }
);

const popup    = document.getElementById('popup');

const btnExplore = document.getElementById('btn-explore');

function openPopup(d, isSub) {
  popupData = d;
  document.getElementById('popup-bar').style.background = hex(d.color);
  document.getElementById('popup-category').textContent = d.category;
  document.getElementById('popup-title').textContent = d.name;
  document.getElementById('popup-desc').textContent = d.desc;
  btnExplore.style.display = (!isSub && d.subs && d.subs.length) ? 'block' : 'none';
  popup.classList.add('open');
  dim.classList.add('show');
}

function closePopup() {
  popup.classList.remove('open');
  dim.classList.remove('show');
}

dim.addEventListener('click', closePopup);
btnClose.addEventListener('click', closePopup);
btnExplore.addEventListener('click', () => {
  closePopup();
  if (popupData) enterSubView(popupData);
});

// ─── Camera animation ─────────────────────────────────────────────────────────
let camAnim = null;
function animCam(toPos, toTarget, dur = 0.55) {
  if (camAnim) camAnim.active = false;
  const from  = camera.position.clone();
  const fromT = controls.target.clone();
  const to    = new THREE.Vector3(...toPos);
  const toT   = new THREE.Vector3(...toTarget);
  const start = performance.now();
  const obj = { active: true };
  camAnim = obj;
  function step(now) {
    if (!obj.active) return;
    const t = Math.min((now - start) / (dur * 1000), 1);
    const e = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(from, to, e);
    controls.target.lerpVectors(fromT, toT, e);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ─── Enter sub-view ──────────────────────────────────────────────────────────
function enterSubView(d) {
  view = 'sub';
  clearHover();

  // Force transparent on GLB before dimming so the fade can start
  if (glbBrain) {
    glbBrain.traverse(child => {
      if (child.isMesh && child.material) {
        child.material.transparent = true;
        child.material.needsUpdate = true;
      }
    });
  }
  glbTargetOpacity = 0.12;

  Object.values(indicatorMeshes).forEach(m => { m.userData.targetOp = 0; });

  // Clear previous blobs + shells
  subMeshes.forEach(m => root.remove(m));
  subMeshes.length = 0;
  glowShells.forEach(m => root.remove(m));
  glowShells.length = 0;

  // Build a glowing blob + outer shell for every sub-region
  d.subs.forEach(s => {
    // Outer glow shell (BackSide, very transparent)
    const shell = makeGlowShell(s.pos, s.scl, s.color, 0);
    shell.userData = { targetOp: 0.18 };
    root.add(shell);
    glowShells.push(shell);

    // Inner blob (clickable)
    const m = makeSubSphere(s.pos, s.scl, s.color, 0);
    m.userData = { id: s.id, kind: 'sub', d: s, targetOp: 1.0 };
    root.add(m);
    subMeshes.push(m);
  });

  buildSubAnnotations(d.subs);

  document.getElementById('btn-back').classList.add('show');
  document.getElementById('hud-sub').textContent = `חוקרים: ${d.name}`;
  document.getElementById('legend').classList.add('hidden');

  const p = d.pos;
  const dist = 5.5;
  animCam([p[0] * 0.5, p[1] * 0.3 + 1.0, p[2] * 0.4 + dist], p, 0.7);
}

// ─── Back to main ────────────────────────────────────────────────────────────
function backToMain() {
  view = 'main';
  closePopup();
  clearHover();

  // Restore GLB opacity
  glbTargetOpacity = 1;

  // Fade out blobs + shells, then remove
  subMeshes.forEach(m => { m.userData.targetOp = 0; });
  glowShells.forEach(m => { m.userData.targetOp = 0; });
  clearSubAnnotations();
  setTimeout(() => {
    subMeshes.forEach(m => root.remove(m));
    subMeshes.length = 0;
    glowShells.forEach(m => root.remove(m));
    glowShells.length = 0;
  }, 700);

  document.getElementById('btn-back').classList.remove('show');
  document.getElementById('hud-sub').textContent = 'לחץ על אזור לחקירה';
  document.getElementById('legend').classList.remove('hidden');

  animCam([0, 1.2, 6.5], [0, 0.1, 0], 0.7);
}

document.getElementById('btn-back').addEventListener('click', backToMain);

// ─── Hover state management ───────────────────────────────────────────────────
function clearHover() {
  if (hoveredRegionId) {
    const ind = indicatorMeshes[hoveredRegionId];
    if (ind) ind.userData.targetOp = 0;
    glowLight.intensity = 0;
    hoveredRegionId = null;
  }
  canvas.style.cursor = 'default';
  tooltip.classList.remove('show');
}

function setHover(regionId, screenX, screenY) {
  if (hoveredRegionId === regionId) {
    // Just update tooltip position
    tooltip.style.left = (screenX + 14) + 'px';
    tooltip.style.top  = (screenY - 10) + 'px';
    return;
  }
  clearHover();
  hoveredRegionId = regionId;
  const d = BRAIN[regionId];
  const ind = indicatorMeshes[regionId];
  if (ind) {
    ind.userData.targetOp = 0.28;
    // Move glow light to region center
    glowLight.color.set(d.color);
    glowLight.position.copy(ind.position);
    glowLight.intensity = 1.2;
  }
  canvas.style.cursor = 'pointer';
  tooltip.textContent = d.name;
  tooltip.style.left = (screenX + 14) + 'px';
  tooltip.style.top  = (screenY - 10) + 'px';
  tooltip.classList.add('show');
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', e => {
  if (isTouchDevice) return;   // no hover on touch — tap opens popup directly
  if (popup.classList.contains('open')) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);

  if (view === 'main') {
    if (glbMeshes.length === 0) return;
    const hits = ray.intersectObjects(glbMeshes, false);
    if (hits.length) {
      // Convert hit point from world space to brain local space
      const worldPt = hits[0].point.clone();
      // The root group has a floating animation; we need to account for it
      const localPt = root.worldToLocal(worldPt.clone());
      const id = regionAtPoint(localPt);
      if (id) setHover(id, e.clientX, e.clientY);
      else clearHover();
    } else {
      clearHover();
    }
  } else {
    // Sub-view: raycast against sub spheres
    const hits = ray.intersectObjects(subMeshes, false);
    if (hits.length) {
      const { d } = hits[0].object.userData;
      canvas.style.cursor = 'pointer';
      tooltip.textContent = d.name;
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
      tooltip.classList.add('show');
      // Emissive highlight on sub sphere
      hits[0].object.material.emissive = new THREE.Color(d.color);
      hits[0].object.material.emissiveIntensity = 0.3;
    } else {
      canvas.style.cursor = 'default';
      tooltip.classList.remove('show');
      subMeshes.forEach(m => { m.material.emissiveIntensity = 0; });
    }
  }
});

// ─── Shared tap/click handler ─────────────────────────────────────────────────
function handleCanvasTap(clientX, clientY) {
  if (popup.classList.contains('open')) return;

  mouse.x = (clientX / innerWidth) * 2 - 1;
  mouse.y = -(clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);

  if (view === 'main') {
    if (glbMeshes.length === 0) return;
    const hits = ray.intersectObjects(glbMeshes, false);
    if (hits.length) {
      const localPt = root.worldToLocal(hits[0].point.clone());
      const id = regionAtPoint(localPt);
      if (id) openPopup(BRAIN[id], false);
    }
  } else {
    const hits = ray.intersectObjects(subMeshes, false);
    if (hits.length) {
      const { d } = hits[0].object.userData;
      openPopup(d, true);
    }
  }
}

canvas.addEventListener('click', e => handleCanvasTap(e.clientX, e.clientY));

// ─── Touch support ────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  // Only treat as tap if finger barely moved (not a drag/orbit)
  if (Math.sqrt(dx * dx + dy * dy) < 12) handleCanvasTap(t.clientX, t.clientY);
}, { passive: true });

// ─── Legend ───────────────────────────────────────────────────────────────────
function buildLegend() {
  const legendEl = document.getElementById('legend');
  Object.entries(BRAIN).forEach(([id, d]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${hex(d.color)}"></div>
                      <div class="legend-label">${d.name}</div>`;
    item.addEventListener('click', () => openPopup(d, false));
    legendEl.appendChild(item);
  });
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Annotation labels (floating strings + text boxes) ───────────────────────
const annSvg = document.getElementById('ann-svg');
const annLabels = {};  // regionId → { el, line, dot }

function buildAnnotations() {
  Object.entries(BRAIN).forEach(([id, d]) => {
    // Dashed SVG line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('stroke', hex(d.color));
    line.setAttribute('stroke-width', '1.2');
    line.setAttribute('stroke-dasharray', '5 4');
    line.setAttribute('opacity', '0');
    annSvg.appendChild(line);

    // Dot at the brain anchor
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('r', '3.5');
    dot.setAttribute('fill', hex(d.color));
    dot.setAttribute('opacity', '0');
    annSvg.appendChild(dot);

    // HTML label box
    const el = document.createElement('div');
    el.className = 'ann-label ann-hidden';
    el.style.borderColor = hex(d.color);
    el.textContent = d.name;
    el.addEventListener('click', () => {
      if (view === 'main') openPopup(d, false);
    });
    document.body.appendChild(el);

    annLabels[id] = { el, line, dot };
  });
}

// Per-region outward nudge: pushes the label further from the brain center
// so labels on densely packed regions don't sit on top of each other.
const ANN_EXTRA = {
  frontal:    110, parietal:  100, 'temporal-l': 105, 'temporal-r': 105,
  occipital:  115, cerebellum: 95, brainstem:    100, limbic:        80,
};

// ─── Sub-view annotation labels ──────────────────────────────────────────────
const subAnnItems = [];  // { el, line, dot, pos }

function buildSubAnnotations(subs) {
  subs.forEach(s => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('stroke', hex(s.color));
    line.setAttribute('stroke-width', '1.2');
    line.setAttribute('stroke-dasharray', '5 4');
    line.setAttribute('opacity', '0');
    annSvg.appendChild(line);

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('r', '3.5');
    dot.setAttribute('fill', hex(s.color));
    dot.setAttribute('opacity', '0');
    annSvg.appendChild(dot);

    const el = document.createElement('div');
    el.className = 'ann-label ann-hidden';
    el.style.borderColor = hex(s.color);
    el.textContent = s.name;
    el.addEventListener('click', () => openPopup(s, true));
    document.body.appendChild(el);

    subAnnItems.push({ el, line, dot, pos: s.pos });
  });
}

function clearSubAnnotations() {
  subAnnItems.forEach(a => { a.line.remove(); a.dot.remove(); a.el.remove(); });
  subAnnItems.length = 0;
}

function updateSubAnnotations() {
  const w = window.innerWidth, h = window.innerHeight;
  const brainCx = w * 0.5, brainCy = h * 0.46;
  const show = view === 'sub' && !popup.classList.contains('open');

  subAnnItems.forEach(a => {
    if (!show) {
      a.el.classList.add('ann-hidden');
      a.line.setAttribute('opacity', '0');
      a.dot.setAttribute('opacity', '0');
      return;
    }

    const worldPos = new THREE.Vector3(...a.pos);
    worldPos.applyMatrix4(root.matrixWorld);
    const proj = worldPos.clone().project(camera);

    if (proj.z >= 1) {
      a.el.classList.add('ann-hidden');
      a.line.setAttribute('opacity', '0');
      a.dot.setAttribute('opacity', '0');
      return;
    }

    const sx = (proj.x + 1) / 2 * w;
    const sy = (-proj.y + 1) / 2 * h;
    const dx = sx - brainCx, dy = sy - brainCy;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = dx / len, ny = dy / len;
    const ex = sx + nx * 90, ey = sy + ny * 90;

    a.line.setAttribute('x1', sx); a.line.setAttribute('y1', sy);
    a.line.setAttribute('x2', ex); a.line.setAttribute('y2', ey);
    a.line.setAttribute('opacity', '0.55');
    a.dot.setAttribute('cx', sx);  a.dot.setAttribute('cy', sy);
    a.dot.setAttribute('opacity', '0.9');
    a.el.style.left = ex + 'px';
    a.el.style.top  = ey + 'px';
    a.el.classList.remove('ann-hidden');
  });
}

// Brain local origin (controls.target is set to this)
const BRAIN_CENTER = new THREE.Vector3(0, 0.1, 0);

// How many labels to show at once — fewer on small screens to avoid clutter
const MAX_ANN_VISIBLE = window.innerWidth < 600 ? 2 : (window.innerWidth < 1024 ? 3 : 4);

function updateAnnotations() {
  const w = window.innerWidth, h = window.innerHeight;
  const brainCx = w * 0.5;
  const brainCy = h * 0.46;
  const isMain   = view === 'main';
  const popupOpen = popup.classList.contains('open');

  // ── Decide which regions are camera-facing ──────────────────────────────
  // camDir = direction FROM brain center TOWARD camera (world space)
  const camDir = camera.position.clone().sub(BRAIN_CENTER).normalize();

  // Score each region by how directly it faces the camera.
  // d.pos is in root-local space; root's rotation is tiny so we treat it as
  // world space for this calculation — the error is negligible.
  const scored = Object.entries(BRAIN).map(([id, d]) => {
    const regionDir = new THREE.Vector3(...d.pos).sub(BRAIN_CENTER).normalize();
    const facing = regionDir.dot(camDir); // +1 = directly facing, -1 = directly behind
    return { id, d, facing };
  });

  // Sort best-facing first, keep only the top N with a positive facing score
  scored.sort((a, b) => b.facing - a.facing);
  const visibleIds = new Set(
    scored
      .filter(s => s.facing > 0.05)   // must be in the front hemisphere
      .slice(0, MAX_ANN_VISIBLE)
      .map(s => s.id)
  );

  // ── Position & show/hide each label ────────────────────────────────────
  Object.entries(BRAIN).forEach(([id, d]) => {
    const ann = annLabels[id];
    if (!ann) return;

    const show = isMain && !popupOpen && visibleIds.has(id);
    if (!show) {
      ann.el.classList.add('ann-hidden');
      ann.line.setAttribute('opacity', '0');
      ann.dot.setAttribute('opacity', '0');
      return;
    }

    // Project 3-D region center → 2-D screen coords
    const worldPos = new THREE.Vector3(...d.pos);
    worldPos.applyMatrix4(root.matrixWorld);
    const proj = worldPos.clone().project(camera);

    if (proj.z >= 1) {  // behind near-plane
      ann.el.classList.add('ann-hidden');
      ann.line.setAttribute('opacity', '0');
      ann.dot.setAttribute('opacity', '0');
      return;
    }

    const sx = (proj.x + 1) / 2 * w;
    const sy = (-proj.y + 1) / 2 * h;

    // Radial direction from visual brain center outward
    const dx = sx - brainCx;
    const dy = sy - brainCy;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = dx / len;
    const ny = dy / len;

    const lineLen = ANN_EXTRA[id] ?? 95;
    const ex = sx + nx * lineLen;
    const ey = sy + ny * lineLen;

    ann.line.setAttribute('x1', sx); ann.line.setAttribute('y1', sy);
    ann.line.setAttribute('x2', ex); ann.line.setAttribute('y2', ey);
    ann.line.setAttribute('opacity', '0.55');
    ann.dot.setAttribute('cx', sx);  ann.dot.setAttribute('cy', sy);
    ann.dot.setAttribute('opacity', '0.9');

    ann.el.style.left = ex + 'px';
    ann.el.style.top  = ey + 'px';
    ann.el.classList.remove('ann-hidden');
  });
}

// ─── Render loop ──────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle float
  root.position.y = Math.sin(t * 0.38) * 0.06;
  root.rotation.y = Math.sin(t * 0.18) * 0.025;

  // Smooth GLB opacity fade + depth-sort fix.
  // When the brain is fully opaque we MUST turn off transparent so WebGL
  // writes depth values correctly — without this some meshes disappear behind
  // others (the classic transparent-object sorting artefact).
  if (glbBrain) {
    glbBrain.traverse(child => {
      if (child.isMesh && child.material) {
        const diff = glbTargetOpacity - child.material.opacity;
        if (Math.abs(diff) > 0.001) child.material.opacity += diff * 0.08;
        const shouldBeTransparent = child.material.opacity < 0.999;
        if (child.material.transparent !== shouldBeTransparent) {
          child.material.transparent = shouldBeTransparent;
          child.material.needsUpdate = true;
        }
      }
    });
  }

  // Smooth indicator sphere opacity fade
  Object.values(indicatorMeshes).forEach(m => {
    if (m.userData.targetOp !== undefined) {
      const diff = m.userData.targetOp - m.material.opacity;
      if (Math.abs(diff) > 0.001) m.material.opacity += diff * 0.1;
    }
  });

  // Smooth sub-sphere opacity fade — disable transparency at full opacity
  // so depth writes are correct and blobs never disappear behind each other.
  subMeshes.forEach(m => {
    if (m.userData.targetOp !== undefined) {
      const diff = m.userData.targetOp - m.material.opacity;
      if (Math.abs(diff) > 0.001) m.material.opacity += diff * 0.09;
      const needsTransparent = m.material.opacity < 0.999;
      if (m.material.transparent !== needsTransparent) {
        m.material.transparent = needsTransparent;
        m.material.needsUpdate = true;
      }
    }
  });

  // Smooth glow shell opacity fade (target: 0.18 when visible)
  glowShells.forEach(m => {
    if (m.userData.targetOp !== undefined) {
      const diff = m.userData.targetOp - m.material.opacity;
      if (Math.abs(diff) > 0.001) m.material.opacity += diff * 0.08;
    }
  });

  updateAnnotations();
  updateSubAnnotations();
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>

<script>
// ─── Brain Mini Chat ──────────────────────────────────────────────────────────
const bcPanel   = document.getElementById('brain-chat-panel');
const bcMsgs    = document.getElementById('bc-messages');
const bcInput   = document.getElementById('bc-input');
const bcSendBtn = document.getElementById('bc-send');
let   bcLoading = false;

function toggleBrainChat() {
  bcPanel.classList.toggle('open');
  if (bcPanel.classList.contains('open')) {
    setTimeout(() => bcInput.focus(), 300);
  }
}

function bcScrollBottom() { bcMsgs.scrollTop = bcMsgs.scrollHeight; }

function bcResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

function bcHandleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); bcSend(); }
}

function bcAppend(text, role) {
  const div = document.createElement('div');
  div.className = 'bc-msg ' + role;
  div.textContent = text;
  bcMsgs.appendChild(div);
  bcScrollBottom();
  return div;
}

// Pre-fill with the currently hovered/selected region context
function bcGetRegionContext() {
  // Try to get selected region name from HUD subtitle
  const sub = document.getElementById('hud-sub').textContent;
  if (sub && sub.startsWith('חוקרים:')) {
    return sub.replace('חוקרים:', '').trim();
  }
  return '';
}

async function bcSend() {
  const q = bcInput.value.trim();
  if (!q || bcLoading) return;

  bcInput.value = '';
  bcResize(bcInput);
  bcAppend(q, 'user');

  bcLoading = true;
  bcSendBtn.disabled = true;

  const typing = bcAppend('...', 'typing');

  const region = bcGetRegionContext();

  try {
    const res = await fetch('/brain-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, region: region }),
    });

    typing.remove();

    if (!res.ok) throw new Error('שגיאת שרת');

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    const ansDiv = bcAppend('', 'bot');
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const obj = JSON.parse(raw);
            const chunk = obj.delta ?? obj.text ?? obj.content ?? '';
            if (chunk) { ansDiv.textContent += chunk; bcScrollBottom(); }
          } catch {}
        }
      }
    }
    if (!ansDiv.textContent) ansDiv.textContent = 'לא הצלחתי לעבד את התשובה.';
  } catch (err) {
    typing.remove();
    bcAppend('שגיאה: ' + err.message, 'bot');
  } finally {
    bcLoading = false;
    bcSendBtn.disabled = false;
  }
}

</script>
